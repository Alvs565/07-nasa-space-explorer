<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">
    <header class="site-header">
      <img src="img/nasa-worm-logo.png" alt="NASA Logo" class="logo" />
      <h1>Space Explorer</h1>
    </header>

    <div class="filters">
      <input type="date" id="startDate" />
      <input type="date" id="endDate" />
      <button>Get Space Images</button>
    </div>

    <div id="gallery" class="gallery">
      <div class="placeholder">
        <div class="placeholder-icon">🔭</div>
        <p>Select a date range and click "Get Space Images" to explore the cosmos!</p>
      </div>
    </div>
  </div>

  <div id="apodModalOverlay" class="modal-overlay">
    <div class="modal">
      <button id="apodModalClose" class="modal-close" aria-label="Close">&times;</button>
      <img id="apodModalImage" class="modal-image" src="" alt="" />
      <div id="apodModalVideoWrapper" class="modal-video-wrapper">
        <iframe
          id="apodModalVideo"
          src=""
          title="APOD video"
          frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen
        ></iframe>
      </div>
      <a id="apodModalVideoLink" class="modal-video-link" href="" target="_blank" rel="noopener noreferrer">
        Watch on YouTube ↗
      </a>
      <h2 id="apodModalTitle"></h2>
      <p id="apodModalDate" class="modal-date"></p>
      <p id="apodModalExplanation" class="modal-explanation"></p>
    </div>
  </div>

  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
